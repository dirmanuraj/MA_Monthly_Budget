<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Expense Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login gate -->
  <div id="loginScreen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">₹</div>
      <h1>Expense Dashboard</h1>
      <p>Enter your password to continue</p>
      <input type="password" id="loginPassword" placeholder="Password" />
      <button id="loginBtn">Unlock</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">₹</span>
        <div>
          <h1>Monthly Expense Dashboard</h1>
          <span class="brand-sub" id="persistenceLabel"></span>
        </div>
      </div>
      <div class="topbar-right">
        <select id="monthSelect" class="month-select"></select>
        <span id="saveStatus" class="save-status">Saved</span>
      </div>
    </header>

    <main class="container">
      <!-- Summary cards -->
      <section class="cards" id="summaryCards"></section>

      <!-- Charts -->
      <section class="grid-2">
        <div class="panel">
          <div class="panel-head"><h2>Budget vs Spent</h2></div>
          <div class="chart-wrap"><canvas id="barChart"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>Spending Split</h2></div>
          <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
        </div>
      </section>

      <!-- Category breakdown -->
      <section class="panel">
        <div class="panel-head"><h2>Category Breakdown</h2></div>
        <div id="categoryBars" class="category-bars"></div>
      </section>

      <!-- Transactions -->
      <section class="panel">
        <div class="panel-head transactions-head">
          <h2>Transactions <span id="txnCount" class="muted"></span></h2>
          <button id="addTxnBtn" class="btn-primary">+ Add transaction</button>
        </div>
        <div class="table-wrap">
          <table class="txn-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th class="num">Amount</th>
                <th>Remarks</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="txnBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state hidden">No transactions yet for this month.</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Transaction modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modalTitle">Add transaction</h3>
      <label>Date<input type="date" id="fDate" /></label>
      <label>Category
        <select id="fCategory"></select>
      </label>
      <label>Amount<input type="number" id="fAmount" min="0" step="0.01" placeholder="0" /></label>
      <label>Remarks<input type="text" id="fRemarks" placeholder="e.g. swiggy, rent" /></label>
      <div class="modal-actions">
        <button id="cancelBtn" class="btn-ghost">Cancel</button>
        <button id="saveTxnBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
